# Creates a GitHub Release on every v* tag push.
# Flow: tests, universal build + Developer ID signing, notarization,
# staple, attach the zip.
#
# Required secrets (repo Settings > Secrets and variables > Actions):
# - MACOS_CERTIFICATE_P12:      base64 of the Developer ID Application cert (.p12)
# - MACOS_CERTIFICATE_PASSWORD: password for that .p12
# - NOTARY_KEY_ID:              Key ID of the App Store Connect API key
# - NOTARY_ISSUER_ID:           its Issuer ID
# - NOTARY_KEY:                 the API key (.p8) contents, verbatim
name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    # MonitorView uses a macOS 26 SDK API (sharedBackgroundVisibility),
    # which needs the macos-26 image where Xcode 26 is the default.
    # The deployment target stays at .macOS(.v15) per Package.swift.
    runs-on: macos-26
    permissions:
      # needed by gh release create
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: swift test

      # Create a dedicated keychain on the runner and import the Developer
      # ID certificate into it. set-key-partition-list lets codesign use
      # the private key without a password prompt (required on headless CI).
      - name: Import Developer ID certificate
        env:
          CERT_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          CERT_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/release.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 3600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          echo "$CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          rm "$RUNNER_TEMP/cert.p12"

      # Tag v1.2.3 becomes VERSION=1.2.3, injected into Info.plist.
      # The identity name "Developer ID Application" is a partial match,
      # resolved against the keychain's actual entry
      # "Developer ID Application: <name> (<Team ID>)".
      - name: Build, sign, verify, and zip
        run: |
          make zip \
            ARCHS="arm64 x86_64" \
            SIGN_IDENTITY="Developer ID Application" \
            VERSION="${GITHUB_REF_NAME#v}"
          codesign --verify --deep --strict --verbose=2 dist/Shepherd.app

      # The notary ticket is stapled to the app rather than the submission zip,
      # so rebuild the GitHub Release asset after stapling.
      # If Apple returns no verdict within 30 minutes, fail without publishing.
      - name: Notarize, staple, and validate
        env:
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
          NOTARY_KEY: ${{ secrets.NOTARY_KEY }}
        run: |
          KEY_FILE="$RUNNER_TEMP/notary-key.p8"
          trap 'rm -f "$KEY_FILE"' EXIT
          install -m 600 /dev/null "$KEY_FILE"
          printf '%s\n' "$NOTARY_KEY" > "$KEY_FILE"
          xcrun notarytool submit dist/Shepherd.zip \
            --key "$KEY_FILE" \
            --key-id "$NOTARY_KEY_ID" \
            --issuer "$NOTARY_ISSUER_ID" \
            --wait \
            --timeout 30m
          xcrun stapler staple dist/Shepherd.app
          xcrun stapler validate dist/Shepherd.app
          ditto -c -k --keepParent dist/Shepherd.app \
            "dist/Shepherd-${GITHUB_REF_NAME#v}.zip"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "dist/Shepherd-${GITHUB_REF_NAME#v}.zip" \
            --title "Shepherd ${GITHUB_REF_NAME#v}" \
            --generate-notes
