# Creates a GitHub Release on every v* tag push.
# Flow: tests, universal build + Developer ID signing, notarization, staple,
# Sparkle appcast generation, attach zip + appcast, bump the Homebrew cask.
#
# Required secrets (repo Settings > Secrets and variables > Actions):
# - MACOS_CERTIFICATE_P12:      base64 of the Developer ID Application cert (.p12)
# - MACOS_CERTIFICATE_PASSWORD: password for that .p12
# - NOTARY_KEY_ID:              Key ID of the App Store Connect API key
# - NOTARY_ISSUER_ID:           its Issuer ID
# - NOTARY_KEY:                 the API key (.p8) contents, verbatim
# - SPARKLE_ED_PRIVATE_KEY:     Sparkle EdDSA private key (generate_keys -x)
# - TAP_PUSH_TOKEN:             (optional) fine-grained PAT, contents: write on
#                               cryks/homebrew-tap; absent = cask bump skipped
name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    # MonitorView uses a macOS 26 SDK API (sharedBackgroundVisibility),
    # which needs the macos-26 image where Xcode 26 is the default.
    # The deployment target stays at .macOS(.v15) per Package.swift.
    runs-on: macos-26
    permissions:
      # needed by gh release create
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: swift test

      # Create a dedicated keychain on the runner and import the Developer
      # ID certificate into it. set-key-partition-list lets codesign use
      # the private key without a password prompt (required on headless CI).
      - name: Import Developer ID certificate
        env:
          CERT_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          CERT_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/release.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 3600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          echo "$CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          rm "$RUNNER_TEMP/cert.p12"

      # Tag v1.2.3 becomes VERSION=1.2.3, injected into Info.plist.
      # The identity name "Developer ID Application" is a partial match,
      # resolved against the keychain's actual entry
      # "Developer ID Application: <name> (<Team ID>)".
      - name: Build, sign, verify, and zip
        run: |
          make zip \
            ARCHS="arm64 x86_64" \
            SIGN_IDENTITY="Developer ID Application" \
            VERSION="${GITHUB_REF_NAME#v}"
          codesign --verify --deep --strict --verbose=2 dist/Shepherd.app

      # The notary ticket is stapled to the app rather than the submission zip,
      # so rebuild the GitHub Release asset after stapling.
      # If Apple returns no verdict within 30 minutes, fail without publishing.
      - name: Notarize, staple, and validate
        env:
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
          NOTARY_KEY: ${{ secrets.NOTARY_KEY }}
        run: |
          KEY_FILE="$RUNNER_TEMP/notary-key.p8"
          trap 'rm -f "$KEY_FILE"' EXIT
          install -m 600 /dev/null "$KEY_FILE"
          printf '%s\n' "$NOTARY_KEY" > "$KEY_FILE"
          xcrun notarytool submit dist/Shepherd.zip \
            --key "$KEY_FILE" \
            --key-id "$NOTARY_KEY_ID" \
            --issuer "$NOTARY_ISSUER_ID" \
            --wait \
            --timeout 30m
          xcrun stapler staple dist/Shepherd.app
          xcrun stapler validate dist/Shepherd.app
          ditto -c -k --keepParent dist/Shepherd.app \
            "dist/Shepherd-${GITHUB_REF_NAME#v}.zip"

      # Sparkle appcast. generate_appcast signs the stapled zip with the EdDSA
      # key and infers version / minimum system version from the Info.plist
      # inside it. The app reads the feed at
      # releases/latest/download/appcast.xml (SUFeedURL), so the appcast is
      # attached to every release rather than hosted separately.
      - name: Generate Sparkle appcast
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          SPARKLE_VERSION=2.9.4
          SPARKLE_SHA256=ce89daf967db1e1893ed3ebd67575ed82d3902563e3191ca92aaec9164fbdef9
          curl -fsSL -o "$RUNNER_TEMP/sparkle.tar.xz" \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz"
          echo "$SPARKLE_SHA256  $RUNNER_TEMP/sparkle.tar.xz" | shasum -a 256 -c -
          mkdir "$RUNNER_TEMP/sparkle"
          tar -xJf "$RUNNER_TEMP/sparkle.tar.xz" -C "$RUNNER_TEMP/sparkle"
          mkdir "$RUNNER_TEMP/appcast"
          cp "dist/Shepherd-${GITHUB_REF_NAME#v}.zip" "$RUNNER_TEMP/appcast/"
          printf '%s' "$SPARKLE_ED_PRIVATE_KEY" | \
            "$RUNNER_TEMP/sparkle/bin/generate_appcast" \
              --ed-key-file - \
              --download-url-prefix "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/" \
              --link "https://github.com/${GITHUB_REPOSITORY}" \
              "$RUNNER_TEMP/appcast"
          mv "$RUNNER_TEMP/appcast/appcast.xml" dist/appcast.xml

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "dist/Shepherd-${GITHUB_REF_NAME#v}.zip" \
            dist/appcast.xml \
            --title "Shepherd ${GITHUB_REF_NAME#v}" \
            --generate-notes

      # Keep the Homebrew cask (cryks/homebrew-tap) pointing at this release.
      # Pushing to another repository needs a fine-grained PAT with
      # contents: write on cryks/homebrew-tap; while the TAP_PUSH_TOKEN secret
      # is absent this step logs and succeeds so the release itself is not
      # blocked on tap credentials.
      - name: Update Homebrew cask
        env:
          TAP_PUSH_TOKEN: ${{ secrets.TAP_PUSH_TOKEN }}
        run: |
          if [ -z "$TAP_PUSH_TOKEN" ]; then
            echo "TAP_PUSH_TOKEN is not set; skipping cask update"
            exit 0
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          SHA256=$(shasum -a 256 "dist/Shepherd-${VERSION}.zip" | awk '{print $1}')
          git clone --depth 1 \
            "https://x-access-token:${TAP_PUSH_TOKEN}@github.com/cryks/homebrew-tap.git" \
            "$RUNNER_TEMP/homebrew-tap"
          cd "$RUNNER_TEMP/homebrew-tap"
          sed -i '' \
            -e "s|^  version \".*\"$|  version \"${VERSION}\"|" \
            -e "s|^  sha256 \".*\"$|  sha256 \"${SHA256}\"|" \
            Casks/shepherd.rb
          git diff --exit-code --quiet Casks/shepherd.rb && {
            echo "cask already at ${VERSION}"; exit 0; }
          git -c user.name="github-actions[bot]" \
              -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
              commit -am "shepherd ${VERSION}"
          git push
