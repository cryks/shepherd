# Creates a GitHub Release on every v* tag push.
# Flow: tests, universal build + Developer ID signing, notarization,
# staple, attach the zip.
#
# Required secrets (repo Settings > Secrets and variables > Actions):
# - MACOS_CERTIFICATE_P12:      base64 of the Developer ID Application cert (.p12)
# - MACOS_CERTIFICATE_PASSWORD: password for that .p12
# - NOTARY_KEY_ID:              Key ID of the App Store Connect API key
# - NOTARY_ISSUER_ID:           its Issuer ID
# - NOTARY_KEY:                 the API key (.p8) contents, verbatim
name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    # MonitorView uses a macOS 26 SDK API (sharedBackgroundVisibility),
    # which needs the macos-26 image where Xcode 26 is the default.
    # The deployment target stays at .macOS(.v15) per Package.swift.
    runs-on: macos-26
    # Covers the notarization wait loop (up to ~90 min) plus the build.
    timeout-minutes: 120
    permissions:
      # needed by gh release create
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: swift test

      # Create a dedicated keychain on the runner and import the Developer
      # ID certificate into it. set-key-partition-list lets codesign use
      # the private key without a password prompt (required on headless CI).
      - name: Import Developer ID certificate
        env:
          CERT_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          CERT_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/release.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 3600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          echo "$CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          rm "$RUNNER_TEMP/cert.p12"

      # Tag v1.2.3 becomes VERSION=1.2.3, injected into Info.plist.
      # The identity name "Developer ID Application" is a partial match,
      # resolved against the keychain's actual entry
      # "Developer ID Application: <name> (<Team ID>)".
      - name: Build, sign, and zip
        run: |
          make zip \
            ARCHS="arm64 x86_64" \
            SIGN_IDENTITY="Developer ID Application" \
            VERSION="${GITHUB_REF_NAME#v}"

      # Notarization submits the zip, but the ticket can only be stapled
      # to the .app inside, not to the zip itself, so the zip is rebuilt
      # after stapling and becomes the release asset.
      #
      # notarytool --wait is not used: its polling exits 1 on a single
      # HTTP error, so a transient network drop on the runner kills the
      # whole job. Instead, submit and wait are separated, with a loop
      # that swallows info errors and keeps waiting.
      - name: Notarize and staple
        env:
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
          NOTARY_KEY: ${{ secrets.NOTARY_KEY }}
        run: |
          KEY_FILE="$RUNNER_TEMP/notary-key.p8"
          echo "$NOTARY_KEY" > "$KEY_FILE"
          NOTARY_ARGS=(--key "$KEY_FILE" --key-id "$NOTARY_KEY_ID" --issuer "$NOTARY_ISSUER_ID")

          # Upload. This too can fail on a transient drop, so try up to 3 times.
          SUBMISSION_ID=""
          for attempt in 1 2 3; do
            SUBMISSION_ID=$(xcrun notarytool submit dist/Shepherd.zip \
              "${NOTARY_ARGS[@]}" --output-format json | jq -r '.id' || true)
            [ -n "$SUBMISSION_ID" ] && break
            echo "submit failed (attempt $attempt), retrying in 30s"
            sleep 30
          done
          if [ -z "$SUBMISSION_ID" ]; then
            echo "could not submit for notarization" >&2
            exit 1
          fi
          echo "submission id: $SUBMISSION_ID"

          # Poll every 60s, up to 90 times (~90 min). The first submission
          # from an account can sit in Apple's review for tens of minutes,
          # hence the generous bound. An info failure (network error etc.)
          # counts as Unknown and the wait continues.
          STATUS="In Progress"
          for i in $(seq 1 90); do
            sleep 60
            RAW=$(xcrun notarytool info "$SUBMISSION_ID" \
              "${NOTARY_ARGS[@]}" --output-format json 2>/dev/null || true)
            STATUS=$(echo "$RAW" | jq -r '.status // empty' 2>/dev/null || true)
            STATUS=${STATUS:-Unknown}
            echo "[$i/90] status: $STATUS"
            case "$STATUS" in
              "In Progress"|"Unknown") ;;
              *) break ;;
            esac
          done

          if [ "$STATUS" != "Accepted" ]; then
            echo "notarization did not complete: $STATUS" >&2
            # For Invalid, the rejection log is available (not while In Progress)
            xcrun notarytool log "$SUBMISSION_ID" "${NOTARY_ARGS[@]}" || true
            exit 1
          fi

          rm "$KEY_FILE"
          xcrun stapler staple dist/Shepherd.app
          ditto -c -k --keepParent dist/Shepherd.app \
            "dist/Shepherd-${GITHUB_REF_NAME#v}.zip"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "dist/Shepherd-${GITHUB_REF_NAME#v}.zip" \
            --title "Shepherd ${GITHUB_REF_NAME#v}" \
            --generate-notes
